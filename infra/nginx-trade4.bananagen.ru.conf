# Системный Nginx (хост) — публикация trade4.bananagen.ru в интернет.
# Проксирует домен на локальный backend trade4 (uvicorn, 127.0.0.1:8001),
# который отдаёт премиум-панель st4 на / и API (/st4/*).
# Не затрагивает trade.bananagen.ru (127.0.0.1:8000) и прочие сайты.
# TLS терминируется выше (Cloudflare), как и у остальных сайтов — здесь только :80.
#
# Установка (требует sudo):
#   sudo cp /opt/trade4/infra/nginx-trade4.bananagen.ru.conf /etc/nginx/sites-available/trade4.bananagen.ru
#   sudo ln -s /etc/nginx/sites-available/trade4.bananagen.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# DNS: A-запись trade4.bananagen.ru → IP сервера (прописывается после готовности проекта).

server {
    listen 80;
    listen [::]:80;
    server_name trade4.bananagen.ru;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
