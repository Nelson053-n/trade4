# Системный Nginx (хост) — публикация trade4.bananagen.ru в интернет.
# Проксирует домен на локальный backend trade4 (uvicorn, 127.0.0.1:8004),
# который отдаёт премиум-панель на / и API (/st4/*, /st5/*).
# Не затрагивает trade.bananagen.ru (127.0.0.1:8000) и прочие сайты.
# TLS терминируется выше (Cloudflare) — здесь только :80.
#
# Установка (требует sudo):
#   sudo cp /opt/trade4/infra/nginx-trade4.bananagen.ru.conf /etc/nginx/sites-available/trade4.bananagen.ru
#   sudo ln -s /etc/nginx/sites-available/trade4.bananagen.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# ВНИМАНИЕ (C1): применять ОСТОРОЖНО на боевом — неполный список CF-диапазонов закроет доступ.
# Проверять nginx -t и иметь запасной SSH-доступ. Актуальные диапазоны Cloudflare:
#   https://www.cloudflare.com/ips-v4  /  https://www.cloudflare.com/ips-v6

# H3: зона rate-limit для /login (anti-bruteforce). 10 запросов/мин на IP, burst 5.
limit_req_zone $binary_remote_addr zone=trade4_login:10m rate=10r/m;

# C1: восстановить реальный IP клиента из заголовка Cloudflare (иначе limit_req/логи видят CF).
# (диапазоны те же, что в allow ниже — для краткости показан принцип; держать в синхроне с CF.)
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    listen [::]:80;
    server_name trade4.bananagen.ru;

    # C1: принимать соединения ТОЛЬКО от Cloudflare — прямой HTTP к origin по IP в обход CF/WAF
    # отклоняется (закрывает перехват пароля и обход защиты). Держать список в синхроне с CF.
    allow 173.245.48.0/20;
    allow 103.21.244.0/22;
    allow 104.16.0.0/13;
    allow 104.24.0.0/14;
    allow 172.64.0.0/13;
    allow 131.0.72.0/22;
    deny all;

    # M1: security-заголовки на уровне nginx (defense-in-depth; backend их тоже ставит).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # H3: ограничение частоты только на форму логина (не трогает торговый API).
    location = /login {
        limit_req zone=trade4_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;   # TLS на CF — backend ставит Secure-cookie
    }

    location / {
        proxy_pass http://127.0.0.1:8004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
