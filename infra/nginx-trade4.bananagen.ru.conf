# Системный Nginx (хост) — публикация trade4.bananagen.ru в интернет.
# Проксирует домен на локальный backend trade4 (uvicorn, 127.0.0.1:8004),
# который отдаёт панель на / и API (/st4/*, /st5/*).
# Не затрагивает trade.bananagen.ru (127.0.0.1:8000) и прочие сайты.
#
# РЕАЛЬНАЯ СХЕМА (проверено 2026-06-29): Cloudflare НЕ используется — домен резолвится прямо
# в IP сервера, TLS терминируется ЗДЕСЬ через Certbot/Let's Encrypt (:443), :80 редиректит на https.
# (Аудит C1 предполагал origin за Cloudflare — это НЕВЕРНО для этого прода, поэтому allow-списков
# по CF-диапазонам тут НЕТ: они отрезали бы всех реальных пользователей.)
#
# Установка (требует sudo). На боевом — с nginx -t и запасным SSH:
#   sudo cp /opt/trade4/infra/nginx-trade4.bananagen.ru.conf /etc/nginx/sites-available/trade4.bananagen.ru
#   sudo ln -s /etc/nginx/sites-available/trade4.bananagen.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# TLS-блок (ssl_certificate и пр.) на проде уже добавлен Certbot — здесь показан без него.

# H3: зона rate-limit для /login (anti-bruteforce). Дублирует in-process лимит в backend
# (defense-in-depth). 10 запросов/мин на IP, burst 5.
limit_req_zone $binary_remote_addr zone=trade4_login:10m rate=10r/m;

# HTTP → HTTPS redirect (на проде эту секцию обычно добавляет Certbot).
server {
    listen 80;
    listen [::]:80;
    server_name trade4.bananagen.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name trade4.bananagen.ru;
    # ssl_certificate / ssl_certificate_key — управляются Certbot (см. /etc/letsencrypt/...).

    # M1: security-заголовки на уровне nginx (defense-in-depth; backend их тоже ставит).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # H3: ограничение частоты только на форму логина (не трогает торговый API).
    location = /login {
        limit_req zone=trade4_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
